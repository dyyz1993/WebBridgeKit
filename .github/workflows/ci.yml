name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ runner.os }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Pods
        run: pod install

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ runner.os }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Pods
        run: pod install

      - name: Start Test Server
        run: |
          cd test-server/lazy-test
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/manifest.json > /dev/null && echo "Server started OK" || echo "Server failed"

      - name: Run Smoke Tests
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -resultBundlePath build/test-results/SmokeResults \
            -only-testing:SuperAppUITests/MainFlowTests \
            -only-testing:SuperAppUITests/SettingsNavigationTests \
            -only-testing:SuperAppUITests/PermissionTests \
            -only-testing:SuperAppUITests/SuperAppUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/smoke-junit.xml || true

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p build/screenshots
          find build/test-results -name "*.png" -exec cp {} build/screenshots/ \; 2>/dev/null || true
          DEVICE_ID=$(xcrun simctl list devices booted -j | python3 -c "import json,sys;[print(d['udid']) or sys.exit(0) for r,ds in json.load(sys.stdin)['devices'].items() for d in ds if d['state']=='Booted']" 2>/dev/null || echo "")
          [ -n "$DEVICE_ID" ] && xcrun simctl io "$DEVICE_ID" screenshot build/screenshots/smoke_final.png || true
          echo "Screenshots: $(ls build/screenshots/ | wc -l) files"

      - name: Upload Smoke Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots
          path: build/screenshots/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/smoke-junit.xml
          check_name: "Smoke Test Results"

  core-tests:
    name: ⚡ Core UI Tests
    runs-on: macos-15
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ runner.os }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Pods
        run: pod install

      - name: Start Test Server
        run: |
          cd test-server/lazy-test
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/manifest.json > /dev/null && echo "Server started OK" || echo "Server failed"

      - name: Run Core Tests (Parallel)
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -resultBundlePath build/test-results/CoreResults \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 3 \
            -skip-testing:SuperAppUITests/ManifestCacheUITests \
            -skip-testing:SuperAppUITests/ManifestCacheContentVerificationTests \
            -skip-testing:SuperAppUITests/ManifestCacheVerificationTests \
            -skip-testing:SuperAppUITests/ManifestCacheButtonDebugUITests \
            -skip-testing:SuperAppUITests/ManifestCacheQuickVerificationTests \
            -skip-testing:SuperAppUITests/ManifestScenariosUITests \
            -skip-testing:SuperAppUITests/ImageCacheVerificationTests \
            -skip-testing:SuperAppUITests/LazyLoadingUITest \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/core-junit.xml || true

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p build/screenshots
          find build/test-results -name "*.png" -exec cp {} build/screenshots/ \; 2>/dev/null || true
          echo "Screenshots: $(ls build/screenshots/ | wc -l) files"

      - name: Upload Core Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-screenshots
          path: build/screenshots/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/core-junit.xml
          check_name: "Core Test Results"

  manifest-tests:
    name: 📦 Manifest Cache Tests
    runs-on: macos-15
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ runner.os }}-${{ hashFiles('Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Pods
        run: pod install

      - name: Run Manifest Cache Tests (Sequential)
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -resultBundlePath build/test-results/ManifestResults \
            -only-testing:SuperAppUITests/ManifestCacheUITests \
            -only-testing:SuperAppUITests/ManifestCacheContentVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheButtonDebugUITests \
            -only-testing:SuperAppUITests/ManifestCacheQuickVerificationTests \
            -only-testing:SuperAppUITests/ManifestScenariosUITests \
            -only-testing:SuperAppUITests/ImageCacheVerificationTests \
            -only-testing:SuperAppUITests/LazyLoadingUITest \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/manifest-junit.xml || true

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p build/screenshots
          find build/test-results -name "*.png" -exec cp {} build/screenshots/ \; 2>/dev/null || true
          echo "Screenshots: $(ls build/screenshots/ | wc -l) files"

      - name: Upload Manifest Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-test-screenshots
          path: build/screenshots/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/manifest-junit.xml
          check_name: "Manifest Test Results"

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --config .swiftlint.yml --reporter github-actions-logging Sources/ SuperApp/Sources/ || true
