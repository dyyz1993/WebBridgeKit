name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CI_START_TIME: ${{ github.event.head_commit.timestamp }}

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-swiftlint

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --config .swiftlint.yml --reporter github-actions-logging Sources/ SuperApp/Sources/ || true

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30
    needs: swiftlint
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Debug \
            -resultBundlePath build/BuildResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build/BuildResults.xcresult
          retention-days: 7

  unit-tests:
    name: Unit Tests (${{ matrix.scheme }})
    runs-on: macos-15
    timeout-minutes: 60
    needs: build
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - CacheTests
          - MessageTests
          - AITests
          - SkillsTests
          - HandlerTests-Part1
          - HandlerTests-Part2
          - BridgeTests
          - CoreTests
          - ModelsTests
          - UtilsTests
          - ServicesTests
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        run: |
          echo "=== SDK Info ==="
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null || true
          xcodebuild -downloadPlatform iOS 2>/dev/null || true
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          SDK_VER=$(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null | cut -d. -f1 || echo "18")
          echo "SDK major version: $SDK_VER"
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runtimes = data.get('runtimes', [])
          ios = [rt for rt in runtimes if 'iOS' in rt.get('identifier', '') and rt.get('isAvailable')]
          if ios:
              sdk_ver = '${SDK_VER}'
              preferred = [rt for rt in ios if rt.get('version', '').startswith(sdk_ver + '.')]
              if preferred:
                  preferred.sort(key=lambda r: tuple(int(x) for x in r.get('version', '0').split('.')), reverse=True)
                  print(preferred[0]['identifier'])
              else:
                  ios.sort(key=lambda r: tuple(int(x) for x in r.get('version', '0').split('.')), reverse=True)
                  for rt in ios:
                      v = rt.get('version', '')
                      major = int(v.split('.')[0]) if v else 99
                      if major <= int(sdk_ver):
                          print(rt['identifier'])
                          break
                  else:
                      print(ios[0]['identifier'])
          else:
              print('', file=sys.stderr)
              sys.exit(1)
          " 2>/dev/null || echo "")
          if [ -z "$RUNTIME" ]; then
            echo "::warning::JSON parse failed, trying runtime identifier fallback"
            for ver in "${SDK_VER}-2" "${SDK_VER}-1" "${SDK_VER}-0" "18-2" "18-1" "18-0" "17-5" "17-4" "17-0"; do
              for sep in "-" "_"; do
                candidate="com.apple.CoreSimulator.SimRuntime.iOS${sep}${ver}"
                if xcrun simctl list runtimes | grep -qF "$candidate"; then
                  RUNTIME="$candidate"
                  break 2
                fi
              done
            done
          fi
          if [ -z "$RUNTIME" ]; then
            echo "::warning::No iOS runtime found, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "CI-Unit-${{ matrix.scheme }}" "iPhone 16 Pro" "$RUNTIME" || echo "")
          if [ -z "$DEVICE_ID" ]; then
            echo "::warning::Failed to create simulator, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "Waiting for simulator to be fully ready..."
          xcrun simctl bootstatus "$DEVICE_ID" -b 2>/dev/null || true
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "use_simulator=true" >> $GITHUB_OUTPUT
          echo "Simulator ready: $DEVICE_ID (runtime: $RUNTIME)"

      - name: Skip ${{ matrix.scheme }} (no simulator)
        if: steps.sim.outputs.use_simulator != 'true'
        run: |
          echo "::warning::No simulator available — skipping ${{ matrix.scheme }}"
          mkdir -p build/test-results
          echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="${{ matrix.scheme }}" tests="1" failures="0"><testcase name="skipped" classname="${{ matrix.scheme }}"/></testsuite></testsuites>' > "build/test-results-${{ matrix.scheme }}.xml"

      - name: Run ${{ matrix.scheme }}
        if: steps.sim.outputs.use_simulator == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme "${{ matrix.scheme }}" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath "build/TestResults-${{ matrix.scheme }}.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output "build/test-results-${{ matrix.scheme }}.xml"

      - name: Publish Coverage Report
        if: always() && success()
        run: |
          xcrun xccov view --report "build/TestResults-${{ matrix.scheme }}.xcresult" > "build/coverage-${{ matrix.scheme }}.txt" 2>/dev/null || echo "No coverage data"
          cat "build/coverage-${{ matrix.scheme }}.txt" || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.scheme }}
          path: "build/TestResults-${{ matrix.scheme }}.xcresult"
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.scheme }}
          path: "build/coverage-${{ matrix.scheme }}.txt"
          retention-days: 7

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find /tmp -name "*.png" -newer /tmp/.CI_START 2>/dev/null -exec cp {} screenshots/ \; || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.scheme }}
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "build/test-results-${{ matrix.scheme }}.xml"
          check_name: "Unit Test Results (${{ matrix.scheme }})"

      - name: Capture Diagnostics
        if: always() && failure()
        run: |
          DEVICE_ID="${{ steps.sim.outputs.device_id }}"
          if [ -n "$DEVICE_ID" ]; then
            mkdir -p diagnostics
            xcrun simctl spawn "$DEVICE_ID" log show --last 2m 2>/dev/null > diagnostics/sim-device.log || true
            echo "=== Device State ===" > diagnostics/device-state.txt
            xcrun simctl list devices | grep -A2 "$DEVICE_ID" >> diagnostics/device-state.txt 2>/dev/null || true
          fi

      - name: Upload Diagnostics
        if: always() && failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.scheme }}
          path: diagnostics/
          retention-days: 7

      - name: Cleanup Simulator
        if: always()
        run: |
          DEVICE_ID="${{ steps.sim.outputs.device_id }}"
          if [ -n "$DEVICE_ID" ]; then
            xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true
            xcrun simctl delete "$DEVICE_ID" 2>/dev/null || true
            echo "Cleaned up simulator: $DEVICE_ID"
          fi

  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Cleanup & Prepare Simulators
        id: prep
        run: |
          set -euo pipefail
          echo "=== Pre-boot cleanup ==="
          xcrun simctl shutdown all 2>/dev/null || true
          sleep 2
          xcrun simctl erase all 2>/dev/null || true
          echo "All existing simulators shut down and erased"

          echo "=== SDK Info ==="
          xcodebuild -version
          SDK_VER=$(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null | cut -d. -f1 || echo "18")
          echo "SDK version: $(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null || echo 'unknown') (major: $SDK_VER)"
          xcodebuild -downloadPlatform iOS 2>/dev/null || true

          echo "=== Available iOS Runtimes ==="
          xcrun simctl list runtimes
          echo ""
          echo "=== Available Devices (iPhone family) ==="
          xcrun simctl list devices available | grep -i iphone || echo "(none found)"

          DESTINATION=""
          for DEVICE_TYPE in "iPhone 15" "iPhone 14" "iPhone SE (3rd generation)"; do
            echo "--- Trying destination: platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest ---"
            if xcodebuild test \
                -workspace WebBridgeKit.xcworkspace \
                -scheme SuperApp \
                -destination "platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest" \
                -configuration Debug \
                -resultBundlePath /tmp/smoke-probe.xcresult \
                -only-testing:SuperAppUITests/SuperAppSmokeTests \
                -skip-testing:SuperAppUITests/SuperAppSmokeTests \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO \
                -quiet 2>&1 | head -5; then
              DESTINATION="platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest"
              echo "✅ Valid destination found: $DESTINATION"
              break
            else
              echo "   ⚠️ Destination not usable, trying next..."
            fi
          done

          rm -rf /tmp/smoke-probe.xcresult 2>/dev/null || true

          if [ -z "$DESTINATION" ]; then
            echo "::warning::No named device destination worked, falling back to generic"
            DESTINATION="generic/platform=iOS Simulator"
          fi

          echo "destination=$DESTINATION" >> $GITHUB_OUTPUT
          echo "Using destination: $DESTINATION"

      - name: Run Smoke Tests
        env:
          CI: "true"
        run: |
          set -o pipefail
          mkdir -p build/test-results
          DESTINATION="${{ steps.prep.outputs.destination }}"

          run_smoke_test() {
            RESULT_PATH="build/test-results/SmokeResults-attempt-${ATTEMPT}.xcresult"
            rm -rf build/test-results/SmokeResults-*.xcresult 2>/dev/null || true
            xcodebuild test \
              -workspace WebBridgeKit.xcworkspace \
              -scheme SuperApp \
              -destination "$DESTINATION" \
              -configuration Debug \
              -resultBundlePath "$RESULT_PATH" \
              -only-testing:SuperAppUITests/SuperAppSmokeTests \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty --color --report junit --output build/test-results/smoke-junit.xml
            RET=$?
            if [ $RET -eq 0 ] && [ -f "$RESULT_PATH" ]; then
              mv "$RESULT_PATH" build/test-results/SmokeResults.xcresult
            fi
            return $RET
          }

          for ATTEMPT in 1 2 3; do
            echo "=== Smoke test attempt $ATTEMPT/$3 (destination: $DESTINATION) ==="
            if run_smoke_test; then
              echo "✅ Smoke tests passed on attempt $ATTEMPT"
              exit 0
            fi
            echo "⚠️ Attempt $ATTEMPT failed, cleaning up before retry..."
            xcrun simctl shutdown all 2>/dev/null || true
            sleep 5
          done
          echo "❌ Smoke tests failed after 3 attempts"
          exit 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: build/test-results/SmokeResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          BOOTED_ID=$(xcrun simctl list devices booted -j 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);print(list(d.get('devices',{}).values())[0][0].get('udid',''))" 2>/dev/null || echo "")
          [ -n "$BOOTED_ID" ] && xcrun simctl io "$BOOTED_ID" screenshot screenshots/smoke_final.png 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/smoke-junit.xml
          check_name: "Smoke Test Results"

      - name: Capture Diagnostics
        if: always()
        run: |
          mkdir -p diagnostics
          xcrun simctl diagnose --output diagnostics/ 2>/dev/null || true
          BOOTED_ID=$(xcrun simctl list devices booted -j 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);ids=[dv.get('udid','') for devs in d.get('devices',{}).values() for dv in devs if dv.get('state')=='Booted'];print(ids[0] if ids else '')" 2>/dev/null || echo "")
          if [ -n "$BOOTED_ID" ]; then
            xcrun simctl spawn "$BOOTED_ID" log show --last 2m 2>/dev/null > diagnostics/sim-device.log || true
          fi
          echo "=== All Device States ===" > diagnostics/device-state.txt
          xcrun simctl list devices >> diagnostics/device-state.txt 2>/dev/null || true

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diagnostics
          path: diagnostics/
          retention-days: 7

      - name: Cleanup Simulators
        if: always()
        run: |
          xcrun simctl shutdown all 2>/dev/null || true
          echo "All simulators shut down"

  ui-fidelity:
    name: 🎨 UI Fidelity Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Cleanup & Prepare Simulators
        id: prep
        run: |
          set -euo pipefail
          echo "=== Pre-boot cleanup ==="
          xcrun simctl shutdown all 2>/dev/null || true
          sleep 2
          xcrun simctl erase all 2>/dev/null || true
          echo "All existing simulators shut down and erased"

          echo "=== SDK Info ==="
          xcodebuild -version
          SDK_VER=$(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null | cut -d. -f1 || echo "18")
          echo "SDK version: $(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null || echo 'unknown') (major: $SDK_VER)"
          xcodebuild -downloadPlatform iOS 2>/dev/null || true

          echo "=== Available iOS Runtimes ==="
          xcrun simctl list runtimes
          echo ""
          echo "=== Available Devices (iPhone family) ==="
          xcrun simctl list devices available | grep -i iphone || echo "(none found)"

          DESTINATION=""
          for DEVICE_TYPE in "iPhone 15" "iPhone 14" "iPhone SE (3rd generation)"; do
            echo "--- Trying destination: platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest ---"
            if xcodebuild test \
                -workspace WebBridgeKit.xcworkspace \
                -scheme SuperApp \
                -destination "platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest" \
                -configuration Debug \
                -resultBundlePath /tmp/uifidelity-probe.xcresult \
                -only-testing:SuperAppUITests/UIFidelityTests \
                -skip-testing:SuperAppUITests/UIFidelityTests \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO \
                -quiet 2>&1 | head -5; then
              DESTINATION="platform=iOS Simulator,name=${DEVICE_TYPE},OS=latest"
              echo "✅ Valid destination found: $DESTINATION"
              break
            else
              echo "   ⚠️ Destination not usable, trying next..."
            fi
          done

          rm -rf /tmp/uifidelity-probe.xcresult 2>/dev/null || true

          if [ -z "$DESTINATION" ]; then
            echo "::warning::No named device destination worked, falling back to generic"
            DESTINATION="generic/platform=iOS Simulator"
          fi

          echo "destination=$DESTINATION" >> $GITHUB_OUTPUT
          echo "Using destination: $DESTINATION"

      - name: Run UI Fidelity Tests
        env:
          CI: "true"
        run: |
          set -o pipefail
          mkdir -p build/screenshots/actual
          mkdir -p build/test-results
          DESTINATION="${{ steps.prep.outputs.destination }}"

          run_ui_fidelity_test() {
            RESULT_PATH="build/test-results/UIFidelityResults-attempt-${ATTEMPT}.xcresult"
            rm -rf build/test-results/UIFidelityResults-*.xcresult 2>/dev/null || true
            xcodebuild test \
              -workspace WebBridgeKit.xcworkspace \
              -scheme SuperApp \
              -destination "$DESTINATION" \
              -configuration Debug \
              -resultBundlePath "$RESULT_PATH" \
              -only-testing:SuperAppUITests/UIFidelityTests \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty --color --report junit --output build/test-results/ui-fidelity-junit.xml
            RET=$?
            if [ $RET -eq 0 ] && [ -f "$RESULT_PATH" ]; then
              mv "$RESULT_PATH" build/test-results/UIFidelityResults.xcresult
            fi
            return $RET
          }

          for ATTEMPT in 1 2 3; do
            echo "=== UI fidelity attempt $ATTEMPT/$3 (destination: $DESTINATION) ==="
            if run_ui_fidelity_test; then
              echo "✅ UI fidelity tests passed on attempt $ATTEMPT"
              exit 0
            fi
            echo "⚠️ Attempt $ATTEMPT failed, cleaning up before retry..."
            xcrun simctl shutdown all 2>/dev/null || true
            sleep 5
          done
          echo "❌ UI fidelity tests failed after 3 attempts"
          exit 1

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p build/screenshots/actual
          if [ -d "build/test-results/UIFidelityResults.xcresult" ]; then
            find build/test-results/UIFidelityResults.xcresult -name "*.png" -exec cp {} build/screenshots/actual/ \; 2>/dev/null || true
          fi
          BOOTED_ID=$(xcrun simctl list devices booted -j 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);ids=[dv.get('udid','') for devs in d.get('devices',{}).values() for dv in devs if dv.get('state')=='Booted'];print(ids[0] if ids else '')" 2>/dev/null || echo "")
          [ -n "$BOOTED_ID" ] && xcrun simctl io "$BOOTED_ID" screenshot build/screenshots/actual/final_state.png 2>/dev/null || true

      - name: Check Reference Images
        id: references
        run: |
          if [ -d "docs/ui-fidelity/references" ] && [ "$(ls -A docs/ui-fidelity/references/*.png 2>/dev/null)" ]; then
            echo "has_references=true" >> $GITHUB_OUTPUT
            echo "Found $(ls docs/ui-fidelity/references/*.png 2>/dev/null | wc -l | tr -d ' ') reference images"
          else
            echo "has_references=false" >> $GITHUB_OUTPUT
            echo "No reference images — will save current as baseline"
          fi

      - name: Save Baseline Screenshots
        if: steps.references.outputs.has_references == 'false'
        run: |
          mkdir -p docs/ui-fidelity/references
          if ls build/screenshots/actual/*.png 1>/dev/null 2>&1; then
            cp build/screenshots/actual/*.png docs/ui-fidelity/references/
            echo "Saved $(ls docs/ui-fidelity/references/*.png 2>/dev/null | wc -l | tr -d ' ') baseline images"
          fi

      - name: Run Diff Comparison
        if: steps.references.outputs.has_references == 'true'
        run: |
          chmod +x tools/diff-screenshots.sh
          OUTPUT_DIR=build/ui-fidelity-diff-report ./tools/diff-screenshots.sh \
            docs/ui-fidelity/references \
            build/screenshots/actual \
            build/ui-fidelity-diff-report \
            5 || true
          if [ -f "build/ui-fidelity-diff-report/results.json" ]; then
            cat build/ui-fidelity-diff-report/results.json
          fi

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-fidelity-screenshots
          path: build/screenshots/actual/
          retention-days: 14

      - name: Upload Diff Report
        if: always() && steps.references.outputs.has_references == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ui-fidelity-diff-report
          path: build/ui-fidelity-diff-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-fidelity-test-results
          path: build/test-results/UIFidelityResults.xcresult
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/ui-fidelity-junit.xml
          check_name: "UI Fidelity Test Results"

      - name: Fail on Diff Exceeding Threshold
        if: steps.references.outputs.has_references == 'true'
        run: |
          if [ -f "build/ui-fidelity-diff-report/results.json" ]; then
            python3 -c "
            import json, sys
            with open('build/ui-fidelity-diff-report/results.json') as f:
                data = json.load(f)
            failures = [r for r in data.get('results', []) if r.get('status') == 'FAIL']
            if failures:
                print(f'❌ {len(failures)} screenshot(s) exceeded diff threshold:')
                for f in failures:
                    print(f'   {f[\"name\"]}: {f[\"diff_percent\"]:.2f}%')
                sys.exit(1)
            else:
                print('✅ All screenshots within threshold')
                sys.exit(0)
            "
          else
            echo "No diff results found, skipping threshold check"
          fi

      - name: Cleanup Simulators
        if: always()
        run: |
          xcrun simctl shutdown all 2>/dev/null || true
          echo "All simulators shut down"
