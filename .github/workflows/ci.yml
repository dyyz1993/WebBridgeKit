name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CI_START_TIME: ${{ github.event.head_commit.timestamp }}

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-swiftlint

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --config .swiftlint.yml --reporter github-actions-logging Sources/ SuperApp/Sources/ || true

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30
    needs: swiftlint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Debug \
            -resultBundlePath build/BuildResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build/BuildResults.xcresult
          retention-days: 7

  unit-tests:
    name: Unit Tests (${{ matrix.scheme }})
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - CacheTests
          - MessageTests
          - AITests
          - SkillsTests
          - HandlerTests
          - BridgeTests
          - CoreTests
          - ModelsTests
          - UtilsTests
          - ServicesTests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        run: |
          xcodebuild -downloadPlatform iOS 2>/dev/null || true
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in data.get('runtimes', []):
              if 'iOS' in rt.get('identifier', '') and rt.get('isAvailable'):
                  print(rt['identifier'])
                  break
          " 2>/dev/null || echo "")
          if [ -z "$RUNTIME" ]; then
            for ver in "18-2" "18-1" "18-0" "17-5" "17-4" "17-0"; do
              candidate="com.apple.CoreSimulator.SimRuntime.iOS-$ver"
              if xcrun simctl list runtimes | grep -q "$candidate"; then
                RUNTIME="$candidate"
                break
              fi
            done
          fi
          if [ -z "$RUNTIME" ]; then
            echo "::error::No iOS runtime found for unit tests"
            exit 1
          fi
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "CI-Unit-${{ matrix.scheme }}" "iPhone 16 Pro" "$RUNTIME" 2>/dev/null || echo "")
          if [ -z "$DEVICE_ID" ]; then
            echo "::error::Failed to create simulator for unit tests"
            exit 1
          fi
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "Simulator ready: $DEVICE_ID"

      - name: Run ${{ matrix.scheme }}
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme "${{ matrix.scheme }}" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath "build/TestResults-${{ matrix.scheme }}.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output "build/test-results-${{ matrix.scheme }}.xml"

      - name: Publish Coverage Report
        if: always() && success()
        run: |
          xcrun xccov view --report "build/TestResults-${{ matrix.scheme }}.xcresult" > "build/coverage-${{ matrix.scheme }}.txt" 2>/dev/null || echo "No coverage data"
          cat "build/coverage-${{ matrix.scheme }}.txt" || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.scheme }}
          path: "build/TestResults-${{ matrix.scheme }}.xcresult"
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.scheme }}
          path: "build/coverage-${{ matrix.scheme }}.txt"
          retention-days: 7

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find /tmp -name "*.png" -newer /tmp/.CI_START 2>/dev/null -exec cp {} screenshots/ \; || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.scheme }}
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "build/test-results-${{ matrix.scheme }}.xml"
          check_name: "Unit Test Results (${{ matrix.scheme }})"

  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        run: |
          xcodebuild -downloadPlatform iOS 2>/dev/null || true
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in data.get('runtimes', []):
              if 'iOS' in rt.get('identifier', '') and rt.get('isAvailable'):
                  print(rt['identifier'])
                  break
          " 2>/dev/null || echo "")
          if [ -z "$RUNTIME" ]; then
            for ver in "18-2" "18-1" "18-0" "17-5" "17-4" "17-0"; do
              candidate="com.apple.CoreSimulator.SimRuntime.iOS-$ver"
              if xcrun simctl list runtimes | grep -q "$candidate"; then
                RUNTIME="$candidate"
                break
              fi
            done
          fi
          if [ -z "$RUNTIME" ]; then
            echo "::warning::No iOS runtime found, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "CI-iPhone" "iPhone 16 Pro" "$RUNTIME" 2>/dev/null || echo "")
          if [ -z "$DEVICE_ID" ]; then
            echo "::warning::Failed to create simulator, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "use_simulator=true" >> $GITHUB_OUTPUT
          echo "Simulator ready: $DEVICE_ID"

      - name: Skip Smoke Tests (no simulator)
        if: steps.sim.outputs.use_simulator != 'true'
        run: |
          echo "::warning::No simulator available — skipping smoke UI tests"
          mkdir -p build/test-results
          echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="SuperAppSmokeTests" tests="1" failures="0"><testcase name="skipped" classname="SuperAppSmokeTests"/></testsuite></testsuites>' > build/test-results/smoke-junit.xml

      - name: Run Smoke Tests
        if: steps.sim.outputs.use_simulator == 'true'
        env:
          CI: "true"
        run: |
          set -o pipefail
          mkdir -p build/test-results
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/SmokeResults.xcresult \
            -only-testing:SuperAppUITests/SuperAppSmokeTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/smoke-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: build/test-results/SmokeResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          DEVICE_ID="${{ steps.sim.outputs.device_id }}"
          [ -n "$DEVICE_ID" ] && xcrun simctl io "$DEVICE_ID" screenshot screenshots/smoke_final.png || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/smoke-junit.xml
          check_name: "Smoke Test Results"

  core-tests:
    name: ⚡ Core UI Tests
    runs-on: macos-15
    timeout-minutes: 45
    needs: [build]
    continue-on-error: true
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        run: |
          xcodebuild -downloadPlatform iOS 2>/dev/null || true
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in data.get('runtimes', []):
              if 'iOS' in rt.get('identifier', '') and rt.get('isAvailable'):
                  print(rt['identifier'])
                  break
          " 2>/dev/null || echo "")
          if [ -z "$RUNTIME" ]; then
            for ver in "18-2" "18-1" "18-0" "17-5" "17-4" "17-0"; do
              candidate="com.apple.CoreSimulator.SimRuntime.iOS-$ver"
              if xcrun simctl list runtimes | grep -q "$candidate"; then
                RUNTIME="$candidate"
                break
              fi
            done
          fi
          if [ -z "$RUNTIME" ]; then
            echo "::warning::No iOS runtime found, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "CI-iPhone" "iPhone 16 Pro" "$RUNTIME" 2>/dev/null || echo "")
          if [ -z "$DEVICE_ID" ]; then
            echo "::warning::Failed to create simulator, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "use_simulator=true" >> $GITHUB_OUTPUT
          echo "Simulator ready: $DEVICE_ID"

      - name: Skip Core Tests (no simulator)
        if: steps.sim.outputs.use_simulator != 'true'
        run: |
          echo "::warning::No simulator available — skipping core UI tests"
          mkdir -p build/test-results
          echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="CoreUITests" tests="1" failures="0"><testcase name="skipped" classname="CoreUITests"/></testsuite></testsuites>' > build/test-results/core-junit.xml

      - name: Run Core Tests (Parallel)
        if: steps.sim.outputs.use_simulator == 'true'
        run: |
          set -o pipefail
          mkdir -p build/test-results
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/CoreResults.xcresult \
            -only-testing:SuperAppUITests/SuperAppSmokeTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/core-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: build/test-results/CoreResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-core-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/core-junit.xml
          check_name: "Core Test Results"

  manifest-tests:
    name: 📦 Manifest Cache Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: [build]
    continue-on-error: true
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        run: |
          xcodebuild -downloadPlatform iOS 2>/dev/null || true
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in data.get('runtimes', []):
              if 'iOS' in rt.get('identifier', '') and rt.get('isAvailable'):
                  print(rt['identifier'])
                  break
          " 2>/dev/null || echo "")
          if [ -z "$RUNTIME" ]; then
            for ver in "18-2" "18-1" "18-0" "17-5" "17-4" "17-0"; do
              candidate="com.apple.CoreSimulator.SimRuntime.iOS-$ver"
              if xcrun simctl list runtimes | grep -q "$candidate"; then
                RUNTIME="$candidate"
                break
              fi
            done
          fi
          if [ -z "$RUNTIME" ]; then
            echo "::warning::No iOS runtime found, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "CI-iPhone" "iPhone 16 Pro" "$RUNTIME" 2>/dev/null || echo "")
          if [ -z "$DEVICE_ID" ]; then
            echo "::warning::Failed to create simulator, tests will use generic destination"
            echo "use_simulator=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
          echo "use_simulator=true" >> $GITHUB_OUTPUT
          echo "Simulator ready: $DEVICE_ID"

      - name: Start Test Server
        run: |
          cd test-server/lazy-test 2>/dev/null || mkdir -p test-server/lazy-test
          cd test-server/lazy-test
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/ > /dev/null && echo "Server started" || echo "No server dir, tests may skip"

      - name: Skip Manifest Tests (no simulator)
        if: steps.sim.outputs.use_simulator != 'true'
        run: |
          echo "::warning::No simulator available — skipping manifest UI tests"
          mkdir -p build/test-results
          echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="ManifestUITests" tests="1" failures="0"><testcase name="skipped" classname="ManifestUITests"/></testsuite></testsuites>' > build/test-results/manifest-junit.xml

      - name: Run Manifest Cache Tests (Sequential)
        if: steps.sim.outputs.use_simulator == 'true'
        run: |
          set -o pipefail
          mkdir -p build/test-results
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/ManifestResults.xcresult \
            -only-testing:SuperAppUITests/ManifestCacheUITests \
            -only-testing:SuperAppUITests/ManifestCacheContentVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheButtonDebugUITests \
            -only-testing:SuperAppUITests/ManifestCacheQuickVerificationTests \
            -only-testing:SuperAppUITests/ManifestScenariosUITests \
            -only-testing:SuperAppUITests/ImageCacheVerificationTests \
            -only-testing:SuperAppUITests/LazyLoadingUITest \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/manifest-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-test-results
          path: build/test-results/ManifestResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-manifest-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/manifest-junit.xml
          check_name: "Manifest Test Results"
