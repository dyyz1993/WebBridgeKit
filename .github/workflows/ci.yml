name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CI_START_TIME: ${{ github.event.head_commit.timestamp }}

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-swiftlint

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --config .swiftlint.yml --reporter github-actions-logging Sources/ SuperApp/Sources/ || true

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30
    needs: swiftlint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Debug \
            -resultBundlePath build/BuildResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build/BuildResults.xcresult
          retention-days: 7

  unit-tests:
    name: Unit Tests (${{ matrix.scheme }})
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - CacheTests
          - MessageTests
          - AITests
          - SkillsTests
          - HandlerTests
          - BridgeTests
          - CoreTests
          - ModelsTests
          - UtilsTests
          - ServicesTests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        uses: ./.github/actions/setup-sim
        with:
          device-type: 'iPhone 16 Pro'

      - name: Run ${{ matrix.scheme }}
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme "${{ matrix.scheme }}" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device-id }}" \
            -resultBundlePath "build/TestResults-${{ matrix.scheme }}.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output "build/test-results-${{ matrix.scheme }}.xml"

      - name: Publish Coverage Report
        if: always() && success()
        run: |
          xcrun xccov view --report "build/TestResults-${{ matrix.scheme }}.xcresult" > "build/coverage-${{ matrix.scheme }}.txt" 2>/dev/null || echo "No coverage data"
          cat "build/coverage-${{ matrix.scheme }}.txt" || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.scheme }}
          path: "build/TestResults-${{ matrix.scheme }}.xcresult"
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.scheme }}
          path: "build/coverage-${{ matrix.scheme }}.txt"
          retention-days: 7

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find /tmp -name "*.png" -newer /tmp/.CI_START 2>/dev/null -exec cp {} screenshots/ \; || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.scheme }}
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "build/test-results-${{ matrix.scheme }}.xml"
          check_name: "Unit Test Results (${{ matrix.scheme }})"

  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        uses: ./.github/actions/setup-sim
        with:
          device-type: 'iPhone 16 Pro'

      - name: Start Test Server
        run: |
          cd test-server/lazy-test
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/manifest.json > /dev/null && echo "Server started OK" || echo "Server failed"

      - name: Run Smoke Tests
        env:
          CI: "true"
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device-id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/SmokeResults.xcresult \
            -only-testing:SuperAppUITests/MainFlowTests \
            -only-testing:SuperAppUITests/SettingsNavigationTests \
            -only-testing:SuperAppUITests/PermissionTests \
            -only-testing:SuperAppUITests/SuperAppUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/smoke-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: build/test-results/SmokeResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          DEVICE_ID="${{ steps.sim.outputs.device-id }}"
          [ -n "$DEVICE_ID" ] && xcrun simctl io "$DEVICE_ID" screenshot screenshots/smoke_final.png || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/smoke-junit.xml
          check_name: "Smoke Test Results"

  core-tests:
    name: ⚡ Core UI Tests
    runs-on: macos-15
    timeout-minutes: 45
    needs: [build]
    continue-on-error: true
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        uses: ./.github/actions/setup-sim
        with:
          device-type: 'iPhone 16 Pro'

      - name: Start Test Server
        run: |
          cd test-server/lazy-test
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/manifest.json > /dev/null && echo "Server started OK" || echo "Server failed"

      - name: Run Core Tests (Parallel)
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device-id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/CoreResults.xcresult \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 3 \
            -skip-testing:SuperAppUITests/ManifestCacheUITests \
            -skip-testing:SuperAppUITests/ManifestCacheContentVerificationTests \
            -skip-testing:SuperAppUITests/ManifestCacheVerificationTests \
            -skip-testing:SuperAppUITests/ManifestCacheButtonDebugUITests \
            -skip-testing:SuperAppUITests/ManifestCacheQuickVerificationTests \
            -skip-testing:SuperAppUITests/ManifestScenariosUITests \
            -skip-testing:SuperAppUITests/ImageCacheVerificationTests \
            -skip-testing:SuperAppUITests/LazyLoadingUITest \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/core-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: build/test-results/CoreResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-core-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/core-junit.xml
          check_name: "Core Test Results"

  manifest-tests:
    name: 📦 Manifest Cache Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: [build]
    continue-on-error: true
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Setup Simulator
        id: sim
        uses: ./.github/actions/setup-sim
        with:
          device-type: 'iPhone 16 Pro'

      - name: Run Manifest Cache Tests (Sequential)
        run: |
          set -o pipefail
          mkdir -p build/test-results
          
          xcodebuild test \
            -workspace WebBridgeKit.xcworkspace \
            -scheme SuperApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device-id }}" \
            -configuration Debug \
            -resultBundlePath build/test-results/ManifestResults.xcresult \
            -only-testing:SuperAppUITests/ManifestCacheUITests \
            -only-testing:SuperAppUITests/ManifestCacheContentVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheVerificationTests \
            -only-testing:SuperAppUITests/ManifestCacheButtonDebugUITests \
            -only-testing:SuperAppUITests/ManifestCacheQuickVerificationTests \
            -only-testing:SuperAppUITests/ManifestScenariosUITests \
            -only-testing:SuperAppUITests/ImageCacheVerificationTests \
            -only-testing:SuperAppUITests/LazyLoadingUITest \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output build/test-results/manifest-junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-test-results
          path: build/test-results/ManifestResults.xcresult
          retention-days: 14

      - name: Collect Screenshots
        if: always()
        run: |
          mkdir -p screenshots
          find build/test-results -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-manifest-tests
          path: screenshots/
          retention-days: 14

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/test-results/manifest-junit.xml
          check_name: "Manifest Test Results"
