name: 'Setup iOS Simulator'
description: 'Create and boot an iOS simulator for testing'
inputs:
  device-type:
    description: 'Simulator device type (e.g. "iPhone 16 Pro")'
    required: false
    default: 'iPhone 16 Pro'
  sim-name:
    description: 'Name for the simulator'
    required: false
    default: 'CI-iPhone'
outputs:
  device-id:
    description: 'Created simulator UDID'
    value: ${{ steps.create.outputs.device_id }}
runs:
  using: 'composite'
  steps:
    - name: List Available Runtimes
      shell: bash
      run: xcrun simctl list runtimes available | grep iOS

    - name: Create Simulator
      id: create
      shell: bash
      run: |
        RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for rt in data.get('runtimes', []):
            ident = rt.get('identifier', '')
            if 'iOS' in ident and rt.get('isAvailable', False):
                print(ident)
                break
        " 2>/dev/null)

        if [ -z "$RUNTIME_ID" ]; then
          echo "ERROR: No iOS runtime found"
          exit 1
        fi

        DEVICE_ID=$(xcrun simctl create "${{ inputs.sim-name }}" "${{ inputs.device-type }}" "$RUNTIME_ID")
        echo "device_id=$DEVICE_ID" >> $GITHUB_OUTPUT
        echo "Created simulator: $DEVICE_ID with runtime $RUNTIME_ID"

    - name: Boot Simulator
      shell: bash
      run: |
        xcrun simctl boot "${{ steps.create.outputs.device_id }}" 2>/dev/null || true
        echo "Simulator booted: ${{ steps.create.outputs.device_id }}"

    - name: Wait for Simulator Ready
      shell: bash
      run: |
        timeout 60 bash -c 'while ! xcrun simctl list devices booted | grep -q "${{ inputs.sim-name }}"; do sleep 2; done'
        echo "Simulator ready"
