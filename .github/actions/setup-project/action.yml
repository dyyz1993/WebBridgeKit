name: 'Setup Xcode Project'
description: 'Install deps, generate project, pod install, and ensure formatter tooling exists'
runs:
  using: 'composite'
  steps:
    - name: Cache Homebrew
      id: cache-brew
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew
        key: brew-${{ runner.os }}-xcodegen-swiftlint

    - name: Install xcodegen & swiftlint
      if: steps.cache-brew.outputs.cache-hit != 'true'
      shell: bash
      run: brew install xcodegen swiftlint

    - name: Ensure CLI tooling available
      shell: bash
      run: |
        command -v xcodegen || brew install xcodegen
        command -v swiftlint || brew install swiftlint
        command -v pod >/dev/null || sudo gem install cocoapods --no-document
        command -v xcpretty >/dev/null || sudo gem install xcpretty --no-document

    - name: Cache CocoaPods
      uses: actions/cache@v4
      with:
        path: Pods
        key: pods-${{ runner.os }}-${{ hashFiles('Podfile.lock') }}
        restore-keys: pods-${{ runner.os }}-

    - name: Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: derived-${{ runner.os }}-xcode16.4-${{ hashFiles('Podfile.lock', 'project.yml') }}
        restore-keys: derived-${{ runner.os }}-xcode16.4-

    - name: Generate & Install
      shell: bash
      run: |
        xcodegen generate --spec project.yml --project .
        pod install
