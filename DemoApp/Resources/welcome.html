<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bark 浏览器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .section {
            margin: 24px 0;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 6px;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-list li {
            margin: 8px 0;
        }
        .link-list a {
            display: block;
            padding: 14px 16px;
            background: #f7f7f7;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
            font-size: 14px;
        }
        .link-list a:active {
            background: #667eea;
            color: white;
            transform: scale(0.98);
        }
        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .feature-item {
            background: #f7f7f7;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }
        .feature-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .feature-text {
            font-size: 13px;
            color: #666;
        }
        .debug-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            width: 100%;
            margin-top: 16px;
        }
        #debugInfo {
            display:none;
            margin-top:16px;
            padding:14px;
            background:#f0f0f0;
            border-radius:10px;
            font-family:monospace;
            font-size:11px;
            line-height:1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Bark 浏览器</h1>
        <p class="subtitle">沉浸式全屏浏览 - 快速、简洁、智能</p>

        <div class="section">
            <div class="section-title">📚 快速访问</div>
            <ul class="link-list">
                <li><a href="https://www.baidu.com">🔍 百度 - 搜索引擎</a></li>
                <li><a href="https://github.com">🐙 GitHub - 代码托管</a></li>
                <li><a href="https://www.apple.com">🍎 Apple - 官方网站</a></li>
            </ul>
        </div>

        <div class="section">
            <div class="section-title">✨ 功能特性</div>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <div class="feature-text">全屏沉浸</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-text">快速加载</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔖</div>
                    <div class="feature-text">收藏管理</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-text">安全浏览</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🔧 调试工具</div>
            <button class="debug-btn" onclick="showDebugInfo()">查看调试信息</button>
            <div id="debugInfo"></div>
        </div>

        <div class="section">
            <div class="section-title">🎛️ URL 参数测试</div>
            <ul class="link-list">
                <li><a href="https://www.baidu.com?hideNavBar=1">隐藏导航栏打开百度</a></li>
                <li><a href="https://www.baidu.com?hideStatusBar=1">隐藏状态栏打开百度</a></li>
                <li><a href="https://www.baidu.com?hideNavBar=1&hideStatusBar=1">完全全屏打开百度</a></li>
            </ul>
        </div>
    </div>

    <script>
        function showDebugInfo() {
            const debugDiv = document.getElementById('debugInfo');
            const info = {
                'User Agent': navigator.userAgent.substring(0, 50) + '...',
                'Platform': navigator.platform,
                'Language': navigator.language,
                'Screen': `${screen.width}x${screen.height}`,
                'Viewport': `${window.innerWidth}x${window.innerHeight}`,
                'Touch Support': 'ontouchstart' in window ? 'Yes' : 'No',
                'JS Bridge': typeof window.webkit !== 'undefined' && typeof window.webkit.messageHandlers !== 'undefined' ? 'Available' : 'Not Available'
            };

            let html = '<strong>🔍 浏览器状态</strong><br><br>';
            for (const [key, value] of Object.entries(info)) {
                html += `<div style='margin:4px 0;'><strong>${key}:</strong> ${value}</div>`;
            }
            html += '<br><strong>✅ 页面加载完成</strong>';

            debugDiv.innerHTML = html;
            debugDiv.style.display = 'block';
        }
    </script>
</body>
</html>
