schemes:
  WebBridgeKit:
    build:
      targets:
        WebBridgeKit: all
    run:
      config: Debug
    archive:
      config: Release

  SuperApp:
    build:
      targets:
        SuperApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SuperAppUITests
      coverageTargets:
        - SuperApp
        - WebBridgeKit
    archive:
      config: Release

  SuperAppUITests:
