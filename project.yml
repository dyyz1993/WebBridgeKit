name: WebBridgeKit
options:
  bundleIdPrefix: com.webbridgekit
  deploymentTarget:
    iOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  defaultConfig: Debug
  carthageBuildPath: Carthage/Build/iOS
  usePods: true
  generateEmptyDirectories: true
  objectVersion: 56

targets:
  WebBridgeKit:
    type: framework
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
      - Resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      PRODUCT_NAME: WebBridgeKit
      PRODUCT_BUNDLE_IDENTIFIER: com.webbridgekit.WebBridgeKit
      SWIFT_VERSION: "5.0"
      SWIFT_EMIT_LOC_STRINGS: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      IPHONEOS_DEPLOYMENT_TARGET: "14.0"
      DEFINES_MODULE: YES
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      ENABLE_PREVIEWS: YES
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
      FRAMEWORK_SEARCH_PATHS:
        - $(inherited)
        - $(SDKROOT)/System/Library/Frameworks
        - $(BUILT_PRODUCTS_DIR)/Pods
      LIBRARY_SEARCH_PATHS:
        - $(inherited)
        - $(BUILT_PRODUCTS_DIR)/Pods
    dependencies: []
    buildPhases:
      - name: 'Copy Resources'
        files:
          - Resources/WebBridge.js
        runOnlyForDeploymentPostprocessing: false

  SuperApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - SuperApp/Sources
      - SuperApp/Resources
    resources:
      - path: SuperApp/Resources
        excludes:
          - "**/*.strings"
          - "**/*.lproj/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.webbridgekit.superapp
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      PRODUCT_NAME: SuperApp
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      FRAMEWORK_SEARCH_PATHS:
        - $(inherited)
        - $(SDKROOT)/System/Library/Frameworks
        - $(BUILT_PRODUCTS_DIR)/Pods
      LIBRARY_SEARCH_PATHS:
        - $(inherited)
        - $(BUILT_PRODUCTS_DIR)/Pods
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "-"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
      INFOPLIST_KEY_NSAppTransportSecurity: YES
    dependencies:
      - target: WebBridgeKit
        embed: true

  SuperAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - SuperAppUITests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.webbridgekit.superapp.ui.tests
      TEST_TARGET_NAME: SuperApp
      SWIFT_VERSION: "5.0"
      GENERATE_INFOPLIST_FILE: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
      ENABLE_PREVIEWS: NO
      ENABLE_SWIFT_TESTING: NO
    dependencies:
      - target: SuperApp

  AppTemplate:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - AppTemplate/Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.webbridgekit.apptemplate
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      PRODUCT_NAME: AppTemplate
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      CODE_SIGN_STYLE: Automatic
