<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器导航控制测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section h2 .icon {
            font-size: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .button.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        .button.warning {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-info {
            display: flex;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-item .value {
            color: #84fab0;
            font-weight: bold;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }

        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-item .time {
            color: #8fd3f4;
            margin-right: 8px;
        }

        .log-item.success { color: #84fab0; }
        .log-item.error { color: #ff9a9e; }
        .log-item.info { color: #fff; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 5px;
        }

        .badge.cached {
            background: #84fab0;
            color: #333;
        }

        .badge.not-cached {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧭 浏览器导航控制测试</h1>
        <p>测试页面打开、导航控制、缓存预加载等功能</p>
    </div>

    <div class="container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-info">
                <div class="status-item">
                    <span>缓存:</span>
                    <span class="value" id="cacheCount">-</span>
                </div>
                <div class="status-item">
                    <span>状态:</span>
                    <span class="value" id="currentStatus">就绪</span>
                </div>
            </div>
            <button class="button" onclick="refreshCacheInfo()">🔄 刷新</button>
        </div>

        <!-- 页面预加载 -->
        <div class="section">
            <h2><span class="icon">⚡</span> 页面预加载和缓存</h2>
            <div class="grid">
                <button class="button primary" onclick="preloadPage('main_test')">
                    预加载主页 <span id="badge-main_test" class="badge not-cached">未缓存</span>
                </button>
                <button class="button primary" onclick="preloadPage('navigation_test')">
                    预加载导航页 <span id="badge-navigation_test" class="badge not-cached">未缓存</span>
                </button>
                <button class="button primary" onclick="preloadPage('js_bridge_test')">
                    预加载JS测试 <span id="badge-js_bridge_test" class="badge not-cached">未缓存</span>
                </button>
                <button class="button primary" onclick="preloadPage('permissions_ui')">
                    预加载权限页 <span id="badge-permissions_ui" class="badge not-cached">未缓存</span>
                </button>
            </div>
            <div style="margin-top: 10px;">
                <button class="button warning" onclick="clearAllCache()">🗑️ 清除所有缓存</button>
                <button class="button" onclick="showCacheInfo()">📊 缓存详情</button>
            </div>
        </div>

        <!-- 打开方式 -->
        <div class="section">
            <h2><span class="icon">🚀</span> 页面打开方式</h2>
            <div class="grid">
                <button class="button success" onclick="openNormalPage()">
                    普通打开<br><small>有返回按钮</small>
                </button>
                <button class="button success" onclick="openModalPage()">
                    弹窗模式<br><small>无堆栈影响</small>
                </button>
                <button class="button success" onclick="openImmersivePage()">
                    全屏沉浸<br><small>隐藏状态栏</small>
                </button>
                <button class="button success" onclick="openCustomModal()">
                    自定义弹窗<br><small>指定尺寸</small>
                </button>
            </div>
        </div>

        <!-- 布局控制 -->
        <div class="section">
            <h2><span class="icon">📐</span> 布局和显示控制</h2>
            <div class="grid">
                <button class="button" onclick="toggleFullscreen()">
                    切换全屏<br><small>隐藏状态栏</small>
                </button>
                <button class="button" onclick="setOrientation('portrait')">
                    竖屏<br><small>强制竖屏</small>
                </button>
                <button class="button" onclick="setOrientation('landscape')">
                    横屏<br><small>强制横屏</small>
                </button>
                <button class="button" onclick="setOrientation('auto')">
                    自动<br><small>跟随系统</small>
                </button>
            </div>
        </div>

        <!-- 导航控制 -->
        <div class="section">
            <h2><span class="icon">🧭</span> 导航控制</h2>
            <div class="grid">
                <button class="button" onclick="goBack()">
                    ← 后退<br><small>返回上一页</small>
                </button>
                <button class="button" onclick="closeCurrentPage()">
                    ✕ 关闭<br><small>关闭当前页</small>
                </button>
                <button class="button" onclick="openMultiplePages()">
                    📑 多页层叠<br><small>测试多级弹窗</small>
                </button>
                <button class="button" onclick="closeAllModals()">
                    🗑️ 关闭所有弹窗<br><small>逐层关闭</small>
                </button>
            </div>
        </div>

        <!-- Tab 页面模拟 -->
        <div class="section">
            <h2><span class="icon">📱</span> Tab 页面缓存模拟</h2>
            <p style="margin-bottom: 10px; opacity: 0.9; font-size: 13px;">
                模拟底部 Tab Bar + WebView 的架构，每个 Tab 的页面可以预先缓存
            </p>
            <div class="grid">
                <button class="button primary" onclick="preloadAllTabs()">
                    ⚡ 预热所有 Tab
                </button>
                <button class="button success" onclick="openTab('home')">
                    🏠 打开首页 Tab
                </button>
                <button class="button success" onclick="openTab('web')">
                    🌐 打开网页 Tab
                </button>
                <button class="button success" onclick="openTab('favorite')">
                    ⭐ 打开收藏 Tab
                </button>
            </div>
        </div>

        <!-- 日志 -->
        <div class="section">
            <h2><span class="icon">📋</span> 操作日志</h2>
            <div class="log-container" id="logContainer">
                <div class="log-item info">
                    <span class="time">--:--:--</span>
                    等待操作...
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshCacheInfo();
            log('页面加载完成', 'success');
        });

        // 日志函数
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.innerHTML = `<span class="time">${time}</span>${message}`;
            container.insertBefore(item, container.firstChild);

            // 限制日志数量
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        // 更新状态
        function updateStatus(status) {
            document.getElementById('currentStatus').textContent = status;
        }

        // ===== 页面预加载 =====

        async function preloadPage(pageName) {
            updateStatus('预加载中...');
            log(`开始预加载: ${pageName}`, 'info');

            try {
                const result = await window.BarkBridge.callNative('page', {
                    action: 'preload',
                    page: pageName
                });

                if (result.success) {
                    log(`✅ 预加载成功: ${pageName}`, 'success');
                    updateBadge(pageName, true);
                } else {
                    log(`❌ 预加载失败: ${pageName}`, 'error');
                }
            } catch (error) {
                log(`❌ 预加载错误: ${error.message}`, 'error');
            }

            refreshCacheInfo();
            updateStatus('就绪');
        }

        async function refreshCacheInfo() {
            try {
                const info = await window.BarkBridge.callNative('page', {
                    action: 'getCacheInfo'
                });

                document.getElementById('cacheCount').textContent = `${info.cacheSize}/${info.maxCacheSize}`;

                // 更新徽章
                if (info.cachedPages) {
                    info.cachedPages.forEach(page => {
                        updateBadge(page, true);
                    });
                }
            } catch (error) {
                console.error('Failed to get cache info:', error);
            }
        }

        function updateBadge(pageName, cached) {
            const badge = document.getElementById(`badge-${pageName}`);
            if (badge) {
                if (cached) {
                    badge.className = 'badge cached';
                    badge.textContent = '已缓存';
                } else {
                    badge.className = 'badge not-cached';
                    badge.textContent = '未缓存';
                }
            }
        }

        async function clearAllCache() {
            updateStatus('清除缓存...');
            log('清除所有页面缓存', 'info');

            try {
                await window.BarkBridge.callNative('page', {
                    action: 'clearCache'
                });
                log('✅ 缓存已清除', 'success');

                // 重置所有徽章
                document.querySelectorAll('.badge.cached').forEach(badge => {
                    badge.className = 'badge not-cached';
                    badge.textContent = '未缓存';
                });

                refreshCacheInfo();
            } catch (error) {
                log(`❌ 清除缓存失败: ${error.message}`, 'error');
            }

            updateStatus('就绪');
        }

        async function showCacheInfo() {
            try {
                const info = await window.BarkBridge.callNative('page', {
                    action: 'getCacheInfo'
                });

                const pages = info.cachedPages || [];
                log(`📊 缓存信息: ${info.cacheSize}/${info.maxCacheSize} 页`, 'info');
                pages.forEach(page => {
                    log(`  - ${page}`, 'info');
                });
            } catch (error) {
                log(`❌ 获取缓存信息失败: ${error.message}`, 'error');
            }
        }

        // ===== 页面打开 =====

        function openNormalPage() {
            log('打开普通页面 (push 模式)', 'info');
            window.BarkBridge.callNative('openPage', {
                page: 'main_test',
                title: '主页测试',
                mode: 'push'
            });
        }

        function openModalPage() {
            log('打开弹窗页面 (modal 模式)', 'info');
            window.BarkBridge.callNative('openPage', {
                page: 'main_test',
                mode: 'modal',
                width: '90%',
                height: '80%',
                mask: true,
                clickMaskClose: true
            });
        }

        function openImmersivePage() {
            log('打开全屏沉浸页面', 'info');
            window.BarkBridge.callNative('openPage', {
                page: 'main_test',
                mode: 'immersive',
                hideStatusBar: true,
                hideTabBar: true,
                disableSwipeBack: true
            });
        }

        function openCustomModal() {
            log('打开自定义尺寸弹窗', 'info');
            window.BarkBridge.callNative('openPage', {
                page: 'navigation_test',
                mode: 'modal',
                width: '70%',
                height: '60%',
                mask: false,
                title: '自定义弹窗'
            });
        }

        // ===== 布局控制 =====

        async function toggleFullscreen() {
            log('切换全屏模式', 'info');
            try {
                const result = await window.BarkBridge.callNative('layout', {
                    action: 'setFullscreen',
                    enabled: true
                });
                log(`✅ 全屏设置: ${result.fullscreen}`, 'success');
            } catch (error) {
                log(`❌ 设置全屏失败: ${error.message}`, 'error');
            }
        }

        async function setOrientation(orientation) {
            log(`设置屏幕方向: ${orientation}`, 'info');
            try {
                await window.BarkBridge.callNative('layout', {
                    action: 'setOrientation',
                    orientation: orientation
                });
                log(`✅ 方向已设置: ${orientation}`, 'success');
            } catch (error) {
                log(`❌ 设置方向失败: ${error.message}`, 'error');
            }
        }

        // ===== 导航控制 =====

        async function goBack() {
            log('返回上一页', 'info');
            try {
                const result = await window.BarkBridge.callNative('goBack', {
                    steps: 1
                });
                if (result.success) {
                    log(`✅ 已返回`, 'success');
                } else {
                    log(`⚠️ 无法返回: ${result.message}`, 'error');
                }
            } catch (error) {
                log(`❌ 返回失败: ${error.message}`, 'error');
            }
        }

        function closeCurrentPage() {
            log('关闭当前页面', 'info');
            window.BarkBridge.callNative('closePage', {
                animated: true,
                reason: 'userAction'
            });
        }

        function openMultiplePages() {
            log('打开多级弹窗测试', 'info');

            setTimeout(() => {
                window.BarkBridge.callNative('openPage', {
                    page: 'main_test',
                    mode: 'modal',
                    width: '85%',
                    height: '75%'
                });

                setTimeout(() => {
                    window.BarkBridge.callNative('openPage', {
                        page: 'navigation_test',
                        mode: 'modal',
                        width: '80%',
                        height: '70%'
                    });

                    log('✅ 已打开 2 级弹窗，请逐层关闭', 'success');
                }, 500);
            }, 100);
        }

        function closeAllModals() {
            log('关闭所有弹窗 (需要多次调用)', 'info');
            closeCurrentPage();
            setTimeout(closeCurrentPage, 300);
            setTimeout(closeCurrentPage, 600);
        }

        // ===== Tab 页面模拟 =====

        async function preloadAllTabs() {
            updateStatus('预热所有 Tab...');
            log('开始预热所有 Tab 页面', 'info');

            const tabs = ['main_test', 'navigation_test', 'js_bridge_test'];
            let successCount = 0;

            for (const tab of tabs) {
                try {
                    await window.BarkBridge.callNative('page', {
                        action: 'preload',
                        page: tab
                    });
                    successCount++;
                    log(`✅ ${tab} 预热成功`, 'success');
                } catch (error) {
                    log(`❌ ${tab} 预热失败`, 'error');
                }
            }

            log(`🎉 Tab 预热完成: ${successCount}/${tabs.length}`, 'success');
            refreshCacheInfo();
            updateStatus('就绪');
        }

        function openTab(tabName) {
            const pages = {
                home: 'main_test',
                web: 'navigation_test',
                favorite: 'js_bridge_test'
            };

            const page = pages[tabName];
            if (page) {
                log(`打开 Tab: ${tabName} (${page})`, 'info');
                window.BarkBridge.callNative('openPage', {
                    page: page,
                    title: tabName.toUpperCase(),
                    hideTabBar: false
                });
            }
        }
    </script>
</body>
</html>
