<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <style>
      .icon { fill: currentColor; }
      .icon-stroke { fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
  </defs>

  <!-- Home Icon -->
  <g transform="translate(50, 50)">
    <path class="icon" d="M 10 30 L 25 15 L 40 30 L 40 45 L 30 45 L 30 35 L 20 35 L 20 45 L 10 45 Z" fill="#2563eb"/>
  </g>

  <!-- User Icon -->
  <g transform="translate(150, 50)">
    <circle class="icon" cx="25" cy="15" r="10" fill="#7c3aed"/>
    <path class="icon" d="M 10 45 Q 25 30 40 45" fill="#7c3aed"/>
  </g>

  <!-- Settings Icon -->
  <g transform="translate(250, 50)">
    <circle class="icon-stroke" cx="25" cy="25" r="8" stroke="#10b981"/>
    <path class="icon-stroke" d="M 25 5 L 25 10 M 25 40 L 25 45 M 5 25 L 10 25 M 40 25 L 45 25 M 11 11 L 15 15 M 35 35 L 39 39 M 11 39 L 15 35 M 35 15 L 39 11" stroke="#10b981"/>
  </g>

  <!-- Search Icon -->
  <g transform="translate(350, 50)">
    <circle class="icon-stroke" cx="18" cy="18" r="10" stroke="#f59e0b"/>
    <line class="icon-stroke" x1="25" y1="25" x2="35" y2="35" stroke="#f59e0b"/>
  </g>

  <!-- Heart Icon -->
  <g transform="translate(50, 150)">
    <path class="icon" d="M 25 45 L 12 32 Q 5 25 12 18 Q 20 12 25 18 Q 30 12 38 18 Q 45 25 38 32 Z" fill="#ef4444"/>
  </g>

  <!-- Star Icon -->
  <g transform="translate(150, 150)">
    <path class="icon" d="M 25 5 L 30 18 L 43 18 L 33 26 L 37 40 L 25 32 L 13 40 L 17 26 L 7 18 L 20 18 Z" fill="#fcd34d"/>
  </g>

  <!-- Check Icon -->
  <g transform="translate(250, 150)">
    <path class="icon-stroke" d="M 10 25 L 20 35 L 40 10" stroke="#22c55e" stroke-width="3" fill="none"/>
  </g>

  <!-- Close Icon -->
  <g transform="translate(350, 150)">
    <path class="icon-stroke" d="M 15 15 L 35 35 M 35 15 L 15 35" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Arrow Left -->
  <g transform="translate(50, 250)">
    <path class="icon-stroke" d="M 35 10 L 15 25 L 35 40" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>

  <!-- Arrow Right -->
  <g transform="translate(150, 250)">
    <path class="icon-stroke" d="M 15 10 L 35 25 L 15 40" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>

  <!-- Arrow Up -->
  <g transform="translate(250, 250)">
    <path class="icon-stroke" d="M 10 35 L 25 15 L 40 35" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>

  <!-- Arrow Down -->
  <g transform="translate(350, 250)">
    <path class="icon-stroke" d="M 10 15 L 25 35 L 40 15" stroke="#2563eb" stroke-width="2" fill="none"/>
  </g>

  <!-- Plus Icon -->
  <g transform="translate(50, 350)">
    <path class="icon-stroke" d="M 25 10 L 25 40 M 10 25 L 40 25" stroke="#10b981" stroke-width="3"/>
  </g>

  <!-- Minus Icon -->
  <g transform="translate(150, 350)">
    <path class="icon-stroke" d="M 10 25 L 40 25" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Edit Icon -->
  <g transform="translate(250, 350)">
    <path class="icon-stroke" d="M 15 40 L 10 40 L 10 35 L 30 15 L 35 20 Z" stroke="#f59e0b" stroke-width="2" fill="none"/>
  </g>

  <!-- Delete Icon -->
  <g transform="translate(350, 350)">
    <path class="icon-stroke" d="M 15 15 L 15 40 L 35 40 L 35 15 M 12 15 L 38 15 M 20 15 L 20 10 L 30 10 L 30 15" stroke="#ef4444" stroke-width="2" fill="none"/>
  </g>

  <!-- Mail Icon -->
  <g transform="translate(50, 450)">
    <rect class="icon-stroke" x="10" y="15" width="30" height="20" rx="2" stroke="#2563eb"/>
    <path class="icon-stroke" d="M 10 18 L 25 28 L 40 18" stroke="#2563eb"/>
  </g>

  <!-- Phone Icon -->
  <g transform="translate(150, 450)">
    <path class="icon-stroke" d="M 18 12 L 22 12 Q 24 12 24 14 L 24 22 Q 24 24 22 24 L 18 24 Q 16 24 16 26 L 16 30 Q 16 32 18 32 L 32 32 Q 34 32 34 30 L 34 26 Q 34 24 32 24 L 28 24 Q 26 24 26 22 L 26 14 Q 26 12 28 12 L 32 12" stroke="#7c3aed" fill="none"/>
  </g>

  <!-- Calendar Icon -->
  <g transform="translate(250, 450)">
    <rect class="icon-stroke" x="10" y="12" width="30" height="26" rx="2" stroke="#f59e0b"/>
    <line class="icon-stroke" x1="10" y1="20" x2="40" y2="20" stroke="#f59e0b"/>
    <line class="icon-stroke" x1="18" y1="8" x2="18" y2="16" stroke="#f59e0b"/>
    <line class="icon-stroke" x1="32" y1="8" x2="32" y2="16" stroke="#f59e0b"/>
  </g>

  <!-- Clock Icon -->
  <g transform="translate(350, 450)">
    <circle class="icon-stroke" cx="25" cy="25" r="15" stroke="#10b981"/>
    <path class="icon-stroke" d="M 25 15 L 25 25 L 32 25" stroke="#10b981" stroke-width="2"/>
  </g>
</svg>