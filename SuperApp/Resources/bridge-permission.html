<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; padding: 16px; background: #f5f5f5; margin: 0; }
        h1 { color: #333; margin: 0 0 16px 0; font-size: 22px; }
        .status-bar { background: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
        .status-bar.ok { background: #d4edda; color: #155724; }
        .status-bar.error { background: #f8d7da; color: #721c24; }
        .test-section { background: white; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
        .test-section h3 { margin: 0 0 12px 0; font-size: 16px; }
        .test-section p { margin: 0 0 8px 0; font-size: 13px; color: #666; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; border: none; border-radius: 8px; color: white; font-size: 14px; cursor: pointer; width: 100%; font-weight: 500; }
        button:active { opacity: 0.7; }
        button:disabled { opacity: 0.5; }
        .btn-primary { background: #667eea; }
        .btn-success { background: #34C759; }
        .btn-warning { background: #FF9500; }
        .btn-danger { background: #FF3B30; }
        .btn-purple { background: #AF52DE; }
        .btn-teal { background: #5AC8FA; color: #333; }
        .btn-gray { background: #8E8E93; }
        .back-btn { position: fixed; top: 16px; left: 16px; width: 36px; height: 36px; border-radius: 18px; background: rgba(0,0,0,0.3); color: white; border: none; font-size: 18px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .log-section { background: #1e1e1e; color: #f0f0f0; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 250px; overflow-y: auto; margin-top: 12px; }
        .log-entry { padding: 3px 0; border-bottom: 1px solid #333; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>🔐 权限管理</h1>
    <div id="statusBar" class="status-bar">检测中...</div>

    <div class="test-section">
        <h3>📋 查询权限状态</h3>
        <p>查询系统各项权限的当前状态</p>
        <div class="btn-grid">
            <button class="btn-primary" onclick="callNative('getPermissionStatus', {permission:'camera'})">getPermissionStatus(camera)</button>
            <button class="btn-primary" onclick="callNative('getPermissionStatus', {permission:'location'})">getPermissionStatus(location)</button>
            <button class="btn-primary" onclick="callNative('getPermissionStatus', {permission:'microphone'})">getPermissionStatus(microphone)</button>
            <button class="btn-primary" onclick="callNative('getPermissionStatus', {permission:'photo'})">getPermissionStatus(photo)</button>
        </div>
    </div>

    <div class="test-section">
        <h3>🔑 请求权限</h3>
        <p>向系统请求使用权限</p>
        <div class="btn-grid">
            <button class="btn-success" onclick="callNative('requestPermission', {permission:'camera'})">requestPermission(camera)</button>
            <button class="btn-success" onclick="callNative('requestPermission', {permission:'location'})">requestPermission(location)</button>
            <button class="btn-success" onclick="callNative('requestPermission', {permission:'microphone'})">requestPermission(microphone)</button>
        </div>
    </div>

    <div class="log-section">
        <div id="logContainer"></div>
    </div>

    <script>
        function addLog(type, message, data) {
            var logContainer = document.getElementById('logContainer');
            var time = new Date().toLocaleTimeString();
            var logClass = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
            var div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = '[' + time + '] [' + type.toUpperCase() + '] ' + message + (data ? ' ' + JSON.stringify(data) : '');
            logContainer.insertBefore(div, logContainer.firstChild);
            if (logContainer.children.length > 100) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        function checkBridge() {
            var hasBridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.BarkBridge;
            var statusBar = document.getElementById('statusBar');
            if (hasBridge) {
                statusBar.className = 'status-bar ok';
                statusBar.textContent = '✅ JS Bridge 可用';
                addLog('success', 'JS Bridge 检测成功');
            } else if (window.BarkBridge && window.BarkBridge.callNative) {
                statusBar.className = 'status-bar ok';
                statusBar.textContent = '✅ BarkBridge 可用';
                addLog('success', 'BarkBridge 检测成功');
            } else {
                statusBar.className = 'status-bar error';
                statusBar.textContent = '❌ JS Bridge 不可用';
                addLog('error', 'JS Bridge 不可用');
            }
            return hasBridge || (window.BarkBridge && typeof window.BarkBridge.callNative === 'function');
        }

        function callNative(action, params) {
            var bridgeReady = checkBridge();
            addLog('info', '调用: ' + action, params);
            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.BarkBridge) {
                    window.webkit.messageHandlers.BarkBridge.postMessage({ action: action, params: params || {} });
                    addLog('info', '请求已发送 (webkit)');
                } else if (window.BarkBridge && window.BarkBridge.callNative) {
                    window.BarkBridge.callNative(action, params || {}).then(function(result) {
                        addLog('success', '成功', result);
                    }).catch(function(err) {
                        addLog('error', '失败: ' + (err.message || err));
                    });
                    addLog('info', '请求已发送 (BarkBridge)');
                } else {
                    addLog('error', 'Bridge 不可用');
                }
            } catch (e) {
                addLog('error', '调用失败: ' + e.message);
            }
        }

        window.BarkBridge = window.BarkBridge || {};
        window.BarkBridge.receiveResult = function(result) {
            if (result.success) {
                addLog('success', '成功', result.data);
            } else {
                addLog('error', '失败: ' + (result.error || 'Unknown'));
            }
        };

        setTimeout(checkBridge, 100);
    </script>
</body>
</html>
