name: SuperApp
options:
  bundleIdPrefix: com.webbridgekit
  deploymentTarget:
    iOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  SuperApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.webbridgekit.superapp
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - target: WebBridgeKit
        embed: true
        link: true
      - target: AI
        embed: true
        link: true

schemes:
  SuperApp:
    build:
      targets:
        SuperApp: all
    run:
      config: Debug
    archive:
      config: Release
