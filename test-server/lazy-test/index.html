<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Mode Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.svg" alt="Logo" class="logo">
            <h1>Lazy Mode Test Page</h1>
        </header>

        <main>
            <section class="info-section">
                <h2>Test Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Mode:</span>
                        <span class="value">Lazy (persistent: false)</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Version:</span>
                        <span class="value">1.0.0</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Cache Status:</span>
                        <span class="value" id="cacheStatus">Checking...</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Load Time:</span>
                        <span class="value" id="loadTime">-</span>
                    </div>
                </div>
            </section>

            <section class="test-section">
                <h2>Resource Test</h2>
                <div class="test-result" id="resourceTest">
                    <p>Testing resource loading...</p>
                </div>
            </section>

            <section class="bridge-section">
                <h2>JS Bridge Test</h2>
                <div class="bridge-status" id="bridgeStatus">
                    <span class="status-indicator"></span>
                    <span class="status-text">Checking...</span>
                </div>
            </section>

            <section class="action-section">
                <h2>Test Actions</h2>
                <div class="action-grid">
                    <button onclick="testAlert()">Test Alert</button>
                    <button onclick="testConsole()">Log to Console</button>
                    <button onclick="reloadPage()">Reload Page</button>
                    <button onclick="showCacheInfo()">Show Cache Info</button>
                </div>
            </section>
        </main>

        <footer>
            <p>WebBridgeKit Manifest Cache Test - Lazy Mode</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // Additional inline tests
        const startTime = Date.now();

        window.addEventListener('load', () => {
            const loadTime = Date.now() - startTime;
            document.getElementById('loadTime').textContent = loadTime + 'ms';

            // Check cache status
            checkCacheStatus();
        });

        function checkCacheStatus() {
            // Check if resources were loaded from cache
            const cacheStatus = document.getElementById('cacheStatus');
            if (performance.getEntriesByType) {
                const entries = performance.getEntriesByType('resource');
                const cachedResources = entries.filter(e => e.transferSize === 0);

                if (cachedResources.length > 0) {
                    cacheStatus.textContent = `Cached (${cachedResources.length}/${entries.length})`;
                    cacheStatus.style.color = '#4CAF50';
                } else {
                    cacheStatus.textContent = 'Not Cached';
                    cacheStatus.style.color = '#FF9800';
                }
            }
        }

        function testAlert() {
            alert('JS Bridge Alert Test: This is a native alert from lazy loaded page');
            console.log('[TEST] Alert dialog shown');
        }

        function testConsole() {
            console.log('[TEST] Console log from lazy loaded page');
            console.log('[TEST] User Agent:', navigator.userAgent);
            console.log('[TEST] Platform:', navigator.platform);
        }

        function reloadPage() {
            location.reload();
        }

        function showCacheInfo() {
            const info = {
                'Current URL': window.location.href,
                'Base URL': document.baseURI,
                'Resources Loaded': performance.getEntriesByType ? performance.getEntriesByType('resource').length : 'N/A'
            };
            alert('Cache Info:\n' + JSON.stringify(info, null, 2));
        }
    </script>
</body>
</html>
